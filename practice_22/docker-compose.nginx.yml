services:
  backend1:
    build: ./backend
    environment:
      INSTANCE_NAME: backend1
      PORT: 3000

  backend2:
    build: ./backend
    environment:
      INSTANCE_NAME: backend2
      PORT: 3000

  backend3:
    build: ./backend
    environment:
      INSTANCE_NAME: backend3-backup
      PORT: 3000

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
