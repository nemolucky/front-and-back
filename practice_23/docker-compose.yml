services:
  backend-1:
    build: ./backend
    environment:
      SERVER_ID: backend-1
      PORT: 3000

  backend-2:
    build: ./backend
    environment:
      SERVER_ID: backend-2
      PORT: 3000

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend-1
      - backend-2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
