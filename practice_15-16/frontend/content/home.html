<div class="home-content">
  <h2 class="section-title">Добавить заметку</h2>
  <form id="note-form" class="note-form">
    <input class="input" type="text" id="note-input" placeholder="Введите текст заметки" required />
    <input class="date-input" type="date" id="note-date" />
    <input class="time-input" type="time" id="note-time" step="60" />
    <button class="btn btn-primary" type="submit">Добавить</button>
  </form>

  <h2 class="notes-title">Список заметок</h2>
  <ul id="notes-list" class="notes-list"></ul>
</div>
