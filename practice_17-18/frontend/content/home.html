<div class="home-content">
  <h2 class="section-title">Добавить заметку</h2>
  <form id="note-form" class="note-form">
    <input class="input" type="text" id="note-input" placeholder="Введите текст заметки" required />
    <button class="btn btn-primary" type="submit">Добавить</button>
  </form>

  <form id="reminder-form" class="reminder-form">
    <input class="input" type="text" id="reminder-text" placeholder="Текст напоминания" required />
    <input class="datetime-input" type="datetime-local" id="reminder-time" required />
    <button class="btn btn-success" type="submit">Добавить с напоминанием</button>
  </form>

  <h2 class="notes-title">Список заметок</h2>
  <ul id="notes-list" class="notes-list"></ul>
</div>
